services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: gatie
      POSTGRES_PASSWORD: gatie
      POSTGRES_DB: gatie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    volumes:
      - vkdata:/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  vkdata:
  caddy_data:
  caddy_config:
